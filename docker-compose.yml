services:
  mysql:
    image: mysql:8.0
    container_name: watch-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: watch
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./BACKEND/watch
    container_name: watch-backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/watch?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      - mysql
    ports:
      - "2021:8080"

  frontend:
    image: nginx:alpine
    container_name: watch-frontend
    restart: always
    volumes:
      - ./FRONTEND/watch/dist:/usr/share/nginx/html
      - ./FRONTEND/watch/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:

